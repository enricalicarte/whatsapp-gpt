<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot GPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <aside id="sidebar">
            <h2>Inicio</h2>
            <nav>
                <ul>
                    <li>Descubrir</li>
                    <li>Espacios</li>
                    <li>Biblioteca</li>
                </ul>
            </nav>
        </aside>
        <main id="main-content">
            <h1>Busca como nunca antes</h1>
            <div id="search-box">
                <input type="text" id="search-input" placeholder="Pregunta lo que sea..." />
                <button id="search-button">➔</button>
            </div>
            <div id="options">
                <button class="option">Enfoque</button>
                <button class="option">Adjuntar</button>
                <label id="toggle-pro">
                    Pro
                    <input type="checkbox" />
                </label>
            </div>
        </main>
    </div>
</body>
</html>
