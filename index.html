<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot GPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <aside id="sidebar">
            <h2>Conversaciones</h2>
            <nav>
                <ul>
                    <li class="brand-conversations" data-brand="Cumlaude">Cumlaude</li>
                    <li class="brand-conversations" data-brand="Rilastil">Rilastil</li>
                    <li class="brand-conversations" data-brand="Sensilis">Sensilis</li>
                </ul>
            </nav>
        </aside>
        <main id="main-content">
            <h1>Chat Vinculado a Marcas</h1>
            <div id="search-box">
                <input type="text" id="search-input" placeholder="Escribe tu mensaje aquí..." />
                <button id="search-button">➔</button>
                <button id="new-conversation-button">🔄</button>
            </div>
            <div id="chat-history">
                <!-- Historial de chat actual -->
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
