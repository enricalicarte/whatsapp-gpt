<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot GPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <!-- Botón de menú hamburguesa -->
        <button id="menu-toggle" aria-label="Abrir menú">
            ☰
        </button>
        <aside id="sidebar">
            <h2>Historial</h2>
            <nav>
                <ul id="conversation-list">
                    <!-- Conversaciones antiguas se agregarán aquí -->
                </ul>
            </nav>
        </aside>
        <main id="main-content">
            <h1>Chat Vinculado a Marcas</h1>
            <div id="chat-history">
                <!-- Historial de chat actual -->
            </div>
            <div id="search-box">
                <input type="text" id="search-input" placeholder="Escribe tu mensaje aquí..." disabled />
                <button id="search-button" disabled>➔</button>
                <button id="new-conversation-button">🔄</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
